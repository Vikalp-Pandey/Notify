# ═══════════════════════════════════════════════
# Workflow Name — shown in GitHub Actions tab
# ═══════════════════════════════════════════════
name: Deploy Notify

# ═══════════════════════════════════════════════
# Triggers — WHEN does this workflow run?
# ═══════════════════════════════════════════════
on:
  push:
    branches: [main]            # Only on push to main branch
  pull_request:
    branches: [main]            # Also on PRs targeting main

# ═══════════════════════════════════════════════
# Environment variables available to ALL jobs
# ═══════════════════════════════════════════════
env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

# ═══════════════════════════════════════════════
# Jobs — Independent execution units
# ═══════════════════════════════════════════════
jobs:

  # ─────────────────────────────────────────────
  # Job 1: Quality Checks (runs on every push & PR)
  # ─────────────────────────────────────────────
  quality:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest        # Use Ubuntu VM (free, fast)

    steps:
      # 1. Download your code to the runner
      - name: Checkout code
        uses: actions/checkout@v4
        # Without this, the runner has an empty filesystem

      # 2. Install pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      # 3. Install Node.js + enable pnpm cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          # 'cache: pnpm' saves node_modules between runs
          # First run: 2 min install. Second run: 10 sec (cached)

      # 4. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        # --frozen-lockfile: fail if lockfile is outdated
        # Ensures CI uses EXACT same versions as your local

      # 5. Run linting
      - name: Lint
        run: pnpm run lint

      # 6. Run type checking
      - name: Type check
        run: pnpm run check-types

  # ─────────────────────────────────────────────
  # Job 2: Deploy Backend (only on push to main)
  # ─────────────────────────────────────────────
  deploy-backend:
    name: "Deploy API to Lambda"
    runs-on: ubuntu-latest
    needs: quality              # Wait for quality job to pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # ^ Only deploy on push to main, NOT on pull requests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── OPTION A: Deploy with SST ──
      - name: Deploy API (SST)
        run: pnpm deploy:prod
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

    

  # ─────────────────────────────────────────────
  # Job 3: Deploy Frontend (only on push to main)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: "Deploy UI to CloudFront"
    runs-on: ubuntu-latest
    needs: [quality, deploy-backend]   # Wait for BOTH to pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── OPTION A: With SST (frontend is part of sst.config.ts) ──
      # If using SST, the frontend deploys in deploy-backend already.
      # You can remove this entire job.

      # ── OPTION B: Manual S3 + CloudFront deploy ──
      - name: Build frontend
        run: pnpm run build --filter ui
        env:
          VITE_API_BASE_URL: ${{ secrets.API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync apps/ui/dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete
        # --delete removes files from S3 that aren't in dist/
        # This keeps S3 in sync with your build output

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
        # CloudFront caches files at edge locations for performance.
        # After deploying new files to S3, you must "invalidate" the cache
        # so edges fetch the new version. "/*" invalidates ALL files.
